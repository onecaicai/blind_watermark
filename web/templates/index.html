<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blind Watermark · 本地工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg-grid"></div>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">blind_watermark v0.4.4</p>
      <h1>图像盲水印</h1>
      <p class="subtitle">在本地浏览器中嵌入或提取不可见文字水印。密码与长度需与嵌入时保持一致。</p>
    </header>

    <div class="tabs" role="tablist" aria-label="功能切换">
      <button class="tab active" data-tab="embed" role="tab" aria-selected="true">嵌入水印</button>
      <button class="tab" data-tab="extract" role="tab" aria-selected="false">提取水印</button>
    </div>

    <section class="panel active" id="panel-embed" role="tabpanel">
      <form id="form-embed" class="form">
        <label class="field">
          <span>原图</span>
          <input type="file" name="image" accept="image/*" required>
          <div class="preview" id="preview-embed"></div>
        </label>
        <label class="field">
          <span>水印文字</span>
          <textarea name="watermark" rows="3" placeholder="例如：@guofei9987 开源万岁！" required></textarea>
        </label>
        <label class="field">
          <span>密码（数字）</span>
          <input type="number" name="password" min="0" placeholder="请输入数字密码" required>
        </label>
        <button type="submit" class="btn primary">嵌入并生成图片</button>
      </form>
      <div class="result hidden" id="result-embed"></div>
    </section>

    <section class="panel" id="panel-extract" role="tabpanel" hidden>
      <form id="form-extract" class="form">
        <label class="field">
          <span>含水印图片</span>
          <input type="file" name="image" accept="image/*" required>
          <div class="preview" id="preview-extract"></div>
        </label>
        <label class="field">
          <span>水印长度 wm_size</span>
          <input type="number" name="wm_size" min="1" placeholder="请输入嵌入时记录的水印长度" required>
          <small>水印长度无法从图片自动识别，需使用嵌入时自行保存的数值。</small>
        </label>
        <label class="field">
          <span>密码（数字）</span>
          <input type="number" name="password" min="0" placeholder="请输入数字密码" required>
        </label>
        <button type="submit" class="btn primary">提取水印</button>
      </form>
      <div class="result hidden" id="result-extract"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
